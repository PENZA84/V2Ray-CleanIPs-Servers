name: Update subscription files

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-subs
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update files
        env:
          BASE_URL: "https://free-sub.indevs.in"
        run: |
          python - << 'PY'
          import os, sys, urllib.request

          base = os.environ.get("BASE_URL", "").rstrip("/")
          mapping = {
            "star": "star.txt",
            "rocket": "rocket.txt",
            "shield": "shield.txt",
            "vip": "vip.txt",
          }

          def fetch(url: str) -> str:
            req = urllib.request.Request(
              url,
              headers={
                "User-Agent": "Mozilla/5.0 (GitHub Actions)",
                "Accept": "*/*",
              },
              method="GET",
            )
            with urllib.request.urlopen(req, timeout=30) as r:
              data = r.read()
            # decode safely
            return data.decode("utf-8", errors="replace").strip() + "\n"

          failed = []
          for key, out_file in mapping.items():
            url = f"{base}/{key}"
            try:
              content = fetch(url)
              with open(out_file, "w", encoding="utf-8", newline="\n") as f:
                f.write(content)
              print(f"Updated {out_file} from {url}")
            except Exception as e:
              failed.append((key, str(e)))
              print(f"FAILED {key}: {e}", file=sys.stderr)

          if failed:
            print("Some fetches failed:", failed, file=sys.stderr)
            # Exit non-zero so you notice problems in Actions logs
            sys.exit(1)
          PY

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add star.txt rocket.txt shield.txt vip.txt

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: update subscription files"
          git push
