name: Update subscription files

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-subs
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update files (with retries + fallback message)
        shell: bash
        run: |
          set -euo pipefail

          BASE_URL="https://free-sub.indevs.in"

          fetch_or_fallback () {
            local key="$1"      # star / rocket / shield / vip
            local out="$2"      # star.txt ...
            local url="${BASE_URL}/${key}"
            local tmp="${out}.tmp"

            # چند بار تلاش (با timeout، retry، و fail روی کدهای 4xx/5xx)
            # اگر دانلود شد ولی خالی بود هم fail حساب می‌کنیم
            if curl -fsSL \
              --connect-timeout 10 \
              --max-time 30 \
              --retry 5 \
              --retry-delay 2 \
              --retry-all-errors \
              -H "User-Agent: Mozilla/5.0 (GitHub Actions)" \
              "$url" -o "$tmp" \
              && [ -s "$tmp" ]; then

              mv "$tmp" "$out"
              echo "✅ Updated $out from $url"
            else
              rm -f "$tmp"
              cat > "$out" <<EOF
# Update failed for: ${key}
# Please fetch manually from:
${url}
EOF
              echo "⚠️ Failed to fetch $url -> wrote fallback message into $out"
            fi
          }

          fetch_or_fallback "star"   "star.txt"
          fetch_or_fallback "rocket" "rocket.txt"
          fetch_or_fallback "shield" "shield.txt"
          fetch_or_fallback "vip"    "vip.txt"

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add star.txt rocket.txt shield.txt vip.txt

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: update subscription files"
          git push
