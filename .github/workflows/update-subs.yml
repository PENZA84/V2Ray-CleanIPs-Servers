name: Update subscription files

on:
  push:
    branches:
      - main   # وقتی همین الان commit کنی اجرا میشه
  schedule:
    - cron: "0 */3 * * *"   # هر 3 ساعت
  workflow_dispatch:        # اجرای دستی

permissions:
  contents: write

concurrency:
  group: update-subs
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update files
        run: |
          BASE_URL="https://free-sub.indevs.in"

          curl -L "$BASE_URL/star"   -o star.txt
          curl -L "$BASE_URL/rocket" -o rocket.txt
          curl -L "$BASE_URL/shield" -o shield.txt
          curl -L "$BASE_URL/vip"    -o vip.txt

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add star.txt rocket.txt shield.txt vip.txt

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: update subscription files"
          git push
