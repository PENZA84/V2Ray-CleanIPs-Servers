name: Update subscription files

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours (at minute 0)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-subs
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update files
        shell: bash
        run: |
          set -euo pipefail

          BASE_URL="https://free-sub.indevs.in"

          fetch_or_fallback () {
            local key="$1"          # star / rocket / shield / vip
            local outfile="$2"      # star.txt / ...
            local url="${BASE_URL}/${key}"

            echo "Updating ${outfile} from ${url}"

            # temp file so we don't overwrite good content with partial downloads
            local tmp
            tmp="$(mktemp)"

            # Try multiple times with curl (standard, no bypass tricks)
            if curl -fsSL \
                --connect-timeout 15 \
                --max-time 60 \
                --retry 5 \
                --retry-delay 2 \
                --retry-all-errors \
                "$url" > "$tmp"; then
              :
            # Fallback to wget (second standard method)
            elif wget -qO "$tmp" --timeout=60 --tries=3 "$url"; then
              :
            else
              # If all attempts fail, write a clear message into the file
              printf "Auto-update failed.\nPlease fetch it manually from:\n%s\n" "$url" > "$tmp"
            fi

            # Ensure file ends with newline and uses LF
            # (If the fetched file already has newlines, this is harmless)
            tail -c1 "$tmp" | read -r _ || echo >> "$tmp"

            mv "$tmp" "$outfile"
          }

          fetch_or_fallback "star"   "star.txt"
          fetch_or_fallback "rocket" "rocket.txt"
          fetch_or_fallback "shield" "shield.txt"
          fetch_or_fallback "vip"    "vip.txt"

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add star.txt rocket.txt shield.txt vip.txt

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: update subscription files"
          git push
