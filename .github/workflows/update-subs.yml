name: Update subscription files

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours (at minute 0)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-subs
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update files
        shell: bash
        run: |
          set -euo pipefail

          BASE_URL="https://free-sub.indevs.in"

          fetch_any () {
            local key="$1"
            local outfile="$2"
            local url="${BASE_URL}/${key}"

            echo "Updating ${outfile} from ${url}"

            local tmp
            tmp="$(mktemp)"

            if curl -fsSL \
              --compressed \
              --connect-timeout 15 \
              --max-time 60 \
              --retry 6 \
              --retry-delay 2 \
              --retry-all-errors \
              -H "User-Agent: Mozilla/5.0 (GitHub Actions)" \
              -H "Accept: */*" \
              -H "Cache-Control: no-cache" \
              "$url" > "$tmp"; then
              :
            elif wget -qO "$tmp" \
              --timeout=60 \
              --tries=4 \
              --header="User-Agent: Mozilla/5.0 (GitHub Actions)" \
              --header="Cache-Control: no-cache" \
              "$url"; then
              :
            else
              printf "FETCH FAILED\n%s\nUTC: %s\n" "$url" "$(date -u '+%Y-%m-%d %H:%M:%S')" > "$tmp"
            fi

            # Ensure file ends with newline
            if [[ "$(tail -c1 "$tmp" 2>/dev/null || true)" != $'\n' ]]; then
              echo >> "$tmp"
            fi

            mv "$tmp" "$outfile"
          }

          fetch_any "star"   "star.txt"
          fetch_any "rocket" "rocket.txt"
          fetch_any "shield" "shield.txt"
          fetch_any "vip"    "vip.txt"

      - name: Commit & push (always)
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage files (always)
          git add star.txt rocket.txt shield.txt vip.txt

          # Create a commit even if there are no content changes
          git commit --allow-empty -m "chore: update subscription files (auto)"

          # Push to main
          git push origin HEAD:main
