name: Update subscription files

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours (at minute 0)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-subs
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update files
        shell: bash
        run: |
          set -euo pipefail

          BASE_URL="https://free-sub.indevs.in"

          is_valid_sub() {
            local f="$1"

            # Reject empty/tiny files
            if [[ ! -s "$f" ]]; then
              return 1
            fi
            if [[ $(wc -c <"$f") -lt 40 ]]; then
              return 1
            fi

            # Reject obvious HTML / block pages
            if grep -qiE '^\s*<!doctype html|^\s*<html|cloudflare|attention required|access denied|forbidden|captcha' "$f"; then
              return 1
            fi

            # Accept if it contains at least one common config scheme
            if grep -qiE '(vmess|vless|trojan|ss|ssr|hysteria2|hy2|tuic)://' "$f"; then
              return 0
            fi

            return 1
          }

          fetch_or_fallback () {
            local key="$1"          # star / rocket / shield / vip
            local outfile="$2"      # star.txt / ...
            local url="${BASE_URL}/${key}"

            echo "Updating ${outfile} from ${url}"

            local tmp
            tmp="$(mktemp)"

            # Try multiple times with curl (normal retries)
            if curl -fsSL \
                --compressed \
                --connect-timeout 15 \
                --max-time 60 \
                --retry 6 \
                --retry-delay 2 \
                --retry-all-errors \
                -H "User-Agent: Mozilla/5.0 (GitHub Actions)" \
                -H "Accept: */*" \
                -H "Cache-Control: no-cache" \
                "$url" > "$tmp"; then
              :
            # Fallback to wget
            elif wget -qO "$tmp" --timeout=60 --tries=4 --header="Cache-Control: no-cache" "$url"; then
              :
            else
              : # handled below by validation
            fi

            # If content is not valid, write a clear fallback message (WITH timestamp)
            if ! is_valid_sub "$tmp"; then
              printf "Auto-update failed or returned invalid content.\n" > "$tmp"
              printf "Please fetch manually from:\n%s\n\n" "$url" >> "$tmp"
              printf "Last attempt (UTC): %s\n" "$(date -u '+%Y-%m-%d %H:%M:%S')" >> "$tmp"
            fi

            # Ensure file ends with newline
            tail -c1 "$tmp" | read -r _ || echo >> "$tmp"

            mv "$tmp" "$outfile"
          }

          fetch_or_fallback "star"   "star.txt"
          fetch_or_fallback "rocket" "rocket.txt"
          fetch_or_fallback "shield" "shield.txt"
          fetch_or_fallback "vip"    "vip.txt"

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add star.txt rocket.txt shield.txt vip.txt

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: update subscription files"
          git push
